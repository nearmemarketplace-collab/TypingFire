<!DOCTYPE html>
<html lang="es" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>StarShine - Social Media Real</title>
    
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

    <style>
        /* === VARIABLES & TEMAS === */
        :root {
            --primary: #00A8E8;
            --primary-gradient: linear-gradient(135deg, #00A8E8, #007EA7);
            --bg-color: #F4F9F9;
            --surface: #FFFFFF;
            --surface-card: rgba(255, 255, 255, 0.8);
            --text-main: #1A1A1A;
            --text-muted: #666666;
            --shadow: 0 8px 32px rgba(0, 0, 0, 0.05);
            --nav-bg: rgba(255, 255, 255, 0.8);
            --glass-border: 1px solid rgba(255, 255, 255, 0.4);
        }

        [data-theme="dark"] {
            --bg-color: #0B0F19;
            --surface: #161F30;
            --surface-card: rgba(22, 31, 48, 0.8);
            --text-main: #F4F9F9;
            --text-muted: #A0AEC0;
            --shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            --nav-bg: rgba(22, 31, 48, 0.8);
            --glass-border: 1px solid rgba(255, 255, 255, 0.05);
        }

        /* === ESTILOS GENERALES === */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            transition: background-color 0.3s, color 0.3s;
            overflow-x: hidden;
            padding-bottom: 80px;
        }

        /* === HEADER === */
        header {
            position: sticky;
            top: 0;
            z-index: 100;
            background: var(--nav-bg);
            backdrop-filter: blur(20px);
            border-bottom: var(--glass-border);
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-size: 24px;
            font-weight: 800;
            background: var(--primary-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -1px;
        }

        /* === CONTENEDOR PRINCIPAL === */
        .container {
            max-width: 600px;
            margin: 0 auto;
            padding: 15px;
        }

        /* === HISTORIAS === */
        .stories-container {
            display: flex;
            gap: 12px;
            overflow-x: auto;
            padding: 10px 5px 20px 5px;
            scrollbar-width: none;
        }
        .stories-container::-webkit-scrollbar {
            display: none;
        }

        .story-card {
            width: 85px;
            height: 120px;
            border-radius: 16px;
            flex-shrink: 0;
            position: relative;
            background-size: cover;
            background-position: center;
            cursor: pointer;
            box-shadow: var(--shadow);
            border: 2px solid var(--primary);
            overflow: hidden;
        }

        .story-card.add-story {
            border: 2px dashed var(--text-muted);
            background: var(--surface);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .add-story-btn {
            width: 35px;
            height: 35px;
            border-radius: 50%;
            background: var(--primary-gradient);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
        }

        .story-user-img {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            border: 2px solid var(--primary);
            position: absolute;
            top: 8px;
            left: 8px;
            object-fit: cover;
        }

        .story-username {
            position: absolute;
            bottom: 8px;
            left: 8px;
            right: 8px;
            font-size: 11px;
            color: white;
            font-weight: bold;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            text-shadow: 0 2px 4px rgba(0,0,0,0.8);
        }

        /* === TARJETAS DE POSTS === */
        .post-card {
            background: var(--surface-card);
            backdrop-filter: blur(10px);
            border: var(--glass-border);
            border-radius: 24px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: var(--shadow);
            animation: slideUp 0.4s ease-out;
        }

        .post-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .post-user-img {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            object-fit: cover;
        }

        .post-username {
            font-weight: 700;
            font-size: 15px;
        }

        .post-time {
            font-size: 11px;
            color: var(--text-muted);
        }

        .post-caption {
            font-size: 14.5px;
            line-height: 1.5;
            margin-bottom: 15px;
            white-space: pre-wrap;
        }

        .post-media {
            border-radius: 16px;
            overflow: hidden;
            margin-bottom: 15px;
            max-height: 400px;
        }

        .post-media img, .post-media video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .post-actions {
            display: flex;
            gap: 20px;
            font-size: 14px;
            color: var(--text-muted);
        }

        .post-actions span {
            display: flex;
            align-items: center;
            gap: 6px;
            cursor: pointer;
            transition: color 0.2s;
        }

        .post-actions span:hover {
            color: var(--primary);
        }

        /* Calificaciones Estrellas */
        .stars-container {
            margin-top: 10px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .stars i {
            color: #ccc;
            cursor: pointer;
            transition: color 0.2s;
        }

        .stars i.gold {
            color: #f1c40f;
        }

        /* === NAVEGACIÓN INFERIOR === */
        nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: var(--nav-bg);
            backdrop-filter: blur(20px);
            border-top: var(--glass-border);
            padding: 15px 0;
            display: flex;
            justify-content: space-around;
            z-index: 100;
            box-shadow: 0 -10px 30px rgba(0,0,0,0.05);
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5px;
            color: var(--text-muted);
            cursor: pointer;
            font-size: 12px;
            font-weight: 600;
            transition: color 0.2s;
        }

        .nav-item.active {
            color: var(--primary);
        }

        .nav-item i {
            font-size: 20px;
        }

        /* === BOTONES === */
        .btn {
            padding: 10px 20px;
            border-radius: 14px;
            border: none;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s, opacity 0.2s;
        }

        .btn:active {
            transform: scale(0.95);
        }

        .btn-primary {
            background: var(--primary-gradient);
            color: white;
            box-shadow: 0 4px 15px rgba(0, 168, 232, 0.4);
        }

        .btn-follow {
            padding: 5px 12px;
            font-size: 12px;
            border-radius: 8px;
            background: rgba(0, 168, 232, 0.1);
            color: var(--primary);
            border: 1px solid var(--primary);
        }

        /* === MODALES === */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.7);
            z-index: 200;
            align-items: center;
            justify-content: center;
            padding: 20px;
            backdrop-filter: blur(8px);
        }

        .modal-content {
            background: var(--surface);
            border-radius: 28px;
            padding: 25px;
            width: 100%;
            max-width: 500px;
            position: relative;
            box-shadow: var(--shadow);
            animation: zoomIn 0.3s ease-out;
            max-height: 90vh;
            overflow-y: auto;
        }

        .close-btn {
            position: absolute;
            top: 20px;
            right: 20px;
            font-size: 24px;
            cursor: pointer;
            color: var(--text-muted);
        }

        /* === VISTAS === */
        .view {
            display: none;
        }

        .view.active {
            display: block;
        }

        /* Animaciones */
        @keyframes slideUp {
            from { transform: translateY(30px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        @keyframes zoomIn {
            from { transform: scale(0.9); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }

        @keyframes pulse {
            0% { transform: scale(1); opacity: 0.95; }
            50% { transform: scale(1.02); opacity: 1; }
            100% { transform: scale(1); opacity: 0.95; }
        }

        /* === ESTILOS PARA COMUNIDAD, COMPARTIDOS Y NOTIFICACIONES === */
        .notif-item {
            background: var(--surface-card);
            border: var(--glass-border);
            border-radius: 16px;
            padding: 15px;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 12px;
            box-shadow: var(--shadow);
        }

        /* === TABS DE POSTEO === */
        .post-type-tabs {
            display: flex;
            gap: 8px;
            margin-bottom: 15px;
        }

        .btn-tab {
            flex: 1;
            padding: 10px;
            border-radius: 12px;
            font-weight: bold;
            font-size: 13px;
            cursor: pointer;
            border: 1.5px solid var(--primary);
            transition: all 0.2s;
        }

        .btn-tab.active {
            background: var(--primary);
            color: white;
        }

        .btn-tab:not(.active) {
            background: transparent;
            color: var(--text-main);
        }
    </style>
</head>
<body>

    <header>
        <span class="logo">StarShine</span>
        <button class="btn btn-primary" onclick="toggleTheme()"><i class="fas fa-moon"></i></button>
    </header>

    <main class="container">
        
        <div id="feed-view" class="view active">
            <div class="stories-container" id="stories-container"></div>
            
            <div id="posts-feed"></div>
        </div>

        <div id="search-view" class="view">
            <div style="display:flex; gap:10px; margin-bottom:20px;">
                <input type="text" id="search-input" placeholder="Buscar usuarios..." style="flex:1; padding:12px; border-radius:14px; border:none; background:var(--surface); color:var(--text-main);">
                <button class="btn btn-primary" onclick="searchUsers()"><i class="fas fa-search"></i></button>
            </div>
            <div id="search-results"></div>
        </div>

        <div id="notifications-view" class="view">
            <h3 id="t-notif-title" style="margin-bottom: 20px;">Notificaciones</h3>
            <div id="notifications-list"></div>
        </div>

        <div id="settings-view" class="view">
            <h3 id="t-settings" style="margin-bottom:20px;">Configuración</h3>
            
            <div style="background:var(--surface); padding:20px; border-radius:20px; display:flex; flex-direction:column; gap:15px; box-shadow:var(--shadow);">
                <div style="display:flex; justify-content:space-between; align-items:center;">
                    <span id="t-dark-theme">Tema Oscuro</span>
                    <button class="btn" onclick="toggleTheme()" id="theme-btn-set">Activar</button>
                </div>
                
                <div style="display:flex; justify-content:space-between; align-items:center;">
                    <span id="t-lang">Idioma</span>
                    <button class="btn" onclick="switchLanguage()" id="lang-btn-set">Español</button>
                </div>

                <button class="btn btn-primary" onclick="switchView('edit-profile-view')" id="t-edit-prof">Editar Perfil</button>
                <button class="btn" onclick="logout()" id="t-logout" style="background:#e74c3c; color:white;">Cerrar Sesión</button>
            </div>
        </div>

        <div id="edit-profile-view" class="view">
            <h3 id="t-edit-prof-title" style="margin-bottom:20px;">Editar Perfil</h3>
            <div style="background:var(--surface); padding:20px; border-radius:20px; display:flex; flex-direction:column; gap:15px; box-shadow:var(--shadow);">
                <div>
                    <label id="t-name" style="font-weight:bold; display:block; margin-bottom:5px;">Nombre</label>
                    <input type="text" id="edit-displayname" style="width:100%; padding:12px; border-radius:12px; border:1px solid #ccc; background:var(--bg-color); color:var(--text-main);">
                </div>
                <div>
                    <label id="t-bio" style="font-weight:bold; display:block; margin-bottom:5px;">Biografía</label>
                    <textarea id="edit-bio" style="width:100%; height:80px; padding:12px; border-radius:12px; border:1px solid #ccc; background:var(--bg-color); color:var(--text-main); resize:none;"></textarea>
                </div>
                <button class="btn btn-primary" onclick="saveProfile()" id="t-save">Guardar</button>
            </div>
        </div>

    </main>

    <nav>
        <div class="nav-item active" onclick="switchView('feed-view')" id="nav-feed">
            <i class="fas fa-home"></i>
            <span>Feed</span>
        </div>
        <div class="nav-item" onclick="switchView('search-view')" id="nav-search">
            <i class="fas fa-search"></i>
            <span>Buscar</span>
        </div>
        <div class="nav-item" onclick="openPostModal()" id="nav-post">
            <i class="fas fa-plus-circle" style="font-size:24px; color:var(--primary);"></i>
            <span>Post</span>
        </div>
        <div class="nav-item" onclick="switchView('notifications-view')" id="nav-notifications">
            <i class="fas fa-bell"></i>
            <span>Notificaciones</span>
        </div>
        <div class="nav-item" onclick="switchView('settings-view')" id="nav-settings">
            <i class="fas fa-cog"></i>
            <span>Ajustes</span>
        </div>
    </nav>

    <div id="post-modal" class="modal">
        <div class="modal-content">
            <span class="close-btn" onclick="closePostModal()">&times;</span>
            <h3 id="t-create-post" style="margin-bottom: 15px;">Crear Publicación</h3>
            
            <div class="post-type-tabs">
                <button class="btn-tab active" onclick="switchPostType('standard')" id="tab-standard">Normal</button>
                <button class="btn-tab" onclick="switchPostType('poll')" id="tab-poll">Encuesta 📊</button>
                <button class="btn-tab" onclick="switchPostType('versus')" id="tab-versus">Versus ⚔️</button>
            </div>
            
            <div id="post-select-view" style="display: flex; flex-direction: column; gap: 10px; margin-bottom: 12px;">
                <div onclick="triggerUpload()" style="border: 2px dashed var(--primary); padding: 25px; text-align: center; border-radius: 16px; cursor: pointer;">
                    <i class="fas fa-image" style="font-size: 24px; color: var(--primary); margin-bottom: 8px;"></i>
                    <p id="t-upload-tap" style="font-size: 13px; font-weight: 600;">Toca para subir foto o video</p>
                </div>
                <input type="file" id="post-file-input" accept="image/*,video/*" style="display:none;" onchange="handleFileSelect(event)">
                <img id="upload-preview" style="display:none; width:100%; max-height:200px; object-fit:cover; border-radius:12px; margin-top:10px;">
            </div>

            <div id="poll-creator-area" style="display: none; border: 1px dashed var(--primary); padding: 15px; border-radius: 16px; margin-bottom: 12px; background: var(--surface-card);">
                <label style="font-weight: bold; font-size: 13px; color: var(--text-main); display: block; margin-bottom: 5px;">Pregunta de la Encuesta:</label>
                <input type="text" id="poll-question" placeholder="¿Qué opinas sobre...?" style="width: 100%; padding: 10px; margin-bottom: 12px; border-radius: 8px; border: 1px solid rgba(0,0,0,0.15); background: var(--surface); color: var(--text-main);">
                
                <label style="font-weight: bold; font-size: 13px; color: var(--text-main); display: block; margin-bottom: 5px;">Opciones (Mínimo 2):</label>
                <input type="text" id="poll-opt-1" placeholder="Opción 1" style="width: 100%; padding: 8px; margin-bottom: 8px; border-radius: 8px; border: 1px solid rgba(0,0,0,0.15); background: var(--surface); color: var(--text-main);">
                <input type="text" id="poll-opt-2" placeholder="Opción 2" style="width: 100%; padding: 8px; margin-bottom: 8px; border-radius: 8px; border: 1px solid rgba(0,0,0,0.15); background: var(--surface); color: var(--text-main);">
                <input type="text" id="poll-opt-3" placeholder="Opción 3 (Opcional)" style="width: 100%; padding: 8px; margin-bottom: 8px; border-radius: 8px; border: 1px solid rgba(0,0,0,0.15); background: var(--surface); color: var(--text-main);">
                <input type="text" id="poll-opt-4" placeholder="Opción 4 (Opcional)" style="width: 100%; padding: 8px; margin-bottom: 8px; border-radius: 8px; border: 1px solid rgba(0,0,0,0.15); background: var(--surface); color: var(--text-main);">
            </div>

            <div id="versus-creator-area" style="display: none; border: 1px dashed #e74c3c; padding: 15px; border-radius: 16px; margin-bottom: 12px; background: var(--surface-card);">
                <label style="font-weight: bold; font-size: 13px; color: var(--text-main); display: block; margin-bottom: 5px;">Buscar Oponente (Usuario):</label>
                <div style="display: flex; gap: 8px; margin-bottom: 10px;">
                    <input type="text" id="versus-opponent-search" placeholder="Escribe el nombre de usuario..." style="flex: 1; padding: 10px; border-radius: 8px; border: 1px solid rgba(0,0,0,0.15); background: var(--surface); color: var(--text-main);">
                    <button class="btn btn-primary" type="button" onclick="searchVersusOpponent()" style="padding: 0 15px; border-radius: 8px;"><i class="fas fa-search"></i></button>
                </div>
                <div id="versus-opponent-results" style="max-height: 120px; overflow-y: auto; background: var(--surface); border: 1px solid rgba(0,0,0,0.15); border-radius: 8px; display: none; margin-bottom: 15px; padding: 5px;"></div>
                
                <div id="selected-opponent-badge" style="display: none; background: rgba(231, 76, 60, 0.1); border: 1px solid #e74c3c; border-radius: 8px; padding: 10px; margin-bottom: 15px; align-items: center; justify-content: space-between;">
                    <span id="selected-opponent-name" style="font-weight: bold; font-size: 13px; color: var(--text-main);">Oponente seleccionado</span>
                    <button type="button" onclick="clearSelectedOpponent()" style="background: none; border: none; color: #e74c3c; cursor: pointer; font-weight: bold; font-size: 16px;">&times;</button>
                </div>

                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 10px;">
                    <div>
                        <label style="font-weight: bold; font-size: 11px; color: var(--text-main); display: block; margin-bottom: 4px;">Opción A (Yo):</label>
                        <input type="text" id="versus-title-a" placeholder="Título A" style="width: 100%; padding: 6px; font-size: 12px; border-radius: 8px; border: 1px solid rgba(0,0,0,0.15); background: var(--surface); color: var(--text-main); margin-bottom: 8px;">
                        <button type="button" onclick="triggerVersusImg('A')" style="width: 100%; padding: 6px; font-size: 10px; border-radius: 8px; border: 1px solid var(--primary); background: transparent; color: var(--text-main); cursor: pointer; font-weight: 600;"><i class="fas fa-image"></i> Foto A</button>
                        <img id="versus-img-a-preview" style="display: none; width: 100%; height: 80px; object-fit: cover; border-radius: 8px; margin-top: 8px;">
                    </div>
                    <div>
                        <label style="font-weight: bold; font-size: 11px; color: var(--text-main); display: block; margin-bottom: 4px;">Opción B (Oponente):</label>
                        <input type="text" id="versus-title-b" placeholder="Título B" style="width: 100%; padding: 6px; font-size: 12px; border-radius: 8px; border: 1px solid rgba(0,0,0,0.15); background: var(--surface); color: var(--text-main); margin-bottom: 8px;">
                        <button type="button" onclick="triggerVersusImg('B')" style="width: 100%; padding: 6px; font-size: 10px; border-radius: 8px; border: 1px solid var(--primary); background: transparent; color: var(--text-main); cursor: pointer; font-weight: 600;"><i class="fas fa-image"></i> Foto B</button>
                        <img id="versus-img-b-preview" style="display: none; width: 100%; height: 80px; object-fit: cover; border-radius: 8px; margin-top: 8px;">
                    </div>
                </div>
                <input type="file" id="versus-file-a" accept="image/*" style="display: none;" onchange="previewVersusImg('A')">
                <input type="file" id="versus-file-b" accept="image/*" style="display: none;" onchange="previewVersusImg('B')">
            </div>

            <textarea id="post-caption" placeholder="¿Qué tienes en mente?" style="width:100%; height:80px; border-radius:14px; padding:12px; border:1px solid #ccc; background:var(--bg-color); color:var(--text-main); resize:none; margin-bottom:15px; font-family:inherit;"></textarea>
            
            <button class="btn btn-primary" id="t-btn-pub" onclick="uploadPost()" style="width:100%;"><i class="fas fa-magic"></i> Publicar</button>
        </div>
    </div>

    <div id="comments-modal" class="modal">
        <div class="modal-content" style="max-height:80vh; display:flex; flex-direction:column;">
            <span class="close-btn" onclick="closeComments()">&times;</span>
            <h3 id="t-comments" style="margin-bottom:15px;">Comentarios</h3>
            <div id="comments-list" style="flex:1; overflow-y:auto; margin-bottom:15px;"></div>
            <div style="display:flex; gap:10px;">
                <input type="text" id="comment-input" placeholder="Escribe un comentario..." style="flex:1; padding:12px; border-radius:12px; border:1px solid #ccc; background:var(--bg-color); color:var(--text-main);">
                <button class="btn btn-primary" id="comment-send-btn">Enviar</button>
            </div>
        </div>
    </div>

    <input type="file" id="story-file-input" accept="image/*,video/*" style="display:none;" onchange="uploadStory(event)">

    <script>
        // CONFIGURACIÓN DE FIREBASE (Mantenida exactamente igual)
        const firebaseConfig = {
            apiKey: "AIzaSyD-T_...",
            authDomain: "yem-starshine.firebaseapp.com",
            databaseURL: "https://yem-starshine-default-rtdb.firebaseio.com",
            projectId: "yem-starshine",
            storageBucket: "yem-starshine.appspot.com",
            messagingSenderId: "777457788448",
            appId: "1:777457788448:web:757367cbe5b27a3c77eb7a"
        };
        
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const auth = firebase.auth();

        let currentUser = null;
        let currentLanguage = 'es';
        let currentTheme = 'dark';
        let uploadedMedia = null;
        let mediaType = null;

            if(activeView) activeView.classList.add('active');
            
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));

        // --- HISTORIAS (SÍ SEGUIDOS + PROPIO - REQUERIMIENTO 1) ---
        function loadStories() {
            const container = document.getElementById('stories-container');
            if (!container) return;
            
            const myUid = auth.currentUser ? auth.currentUser.uid : null;
            if (!myUid) {
                container.innerHTML = '';
                return;
            }
            
            // Listener en tiempo real de seguidos
            db.ref(`follows/${myUid}`).on('value', followsSnap => {
                const follows = followsSnap.val() || {};
                
                // Listener en tiempo real de historias
                db.ref('stories').on('value', snapshot => {
                    container.innerHTML = '';
                    
                    // Botón para crear historia
                    const addStoryDiv = document.createElement('div');
                    addStoryDiv.className = 'story-card add-story';
                    addStoryDiv.innerHTML = `
                        <div class="add-story-btn">
                            <i class="fas fa-plus"></i>
                        </div>
                        <p style="margin-top: 8px; font-size: 11px; font-weight: 600;">Mi historia</p>
                    `;
                    addStoryDiv.onclick = () => {
                        document.getElementById('story-file-input').click();
                    };
                    container.appendChild(addStoryDiv);
                    
                    const stories = [];
                    snapshot.forEach(child => {
                        stories.push(child.val());
                    });
                    
                    // Ordenar por tiempo descendente
                    stories.sort((a,b) => b.timestamp - a.timestamp);
                    
                    const uniqueStories = {};
                    stories.forEach(s => {
                        if(!uniqueStories[s.uid]) {
                            uniqueStories[s.uid] = [];
                        }
                        uniqueStories[s.uid].push(s);
                    });
                    
                    Object.keys(uniqueStories).forEach(uid => {
                        // Solo mostrar si es del propio usuario o de alguien que sigue
                        if (uid === myUid || follows[uid]) {
                            const userStories = uniqueStories[uid];
                            const latest = userStories[0];
                            
                            const card = document.createElement('div');
                            card.className = 'story-card';
                            card.style.backgroundImage = `url('${latest.mediaUrl}')`;
                            card.innerHTML = `
                                <img src="${latest.userPhoto || 'https://via.placeholder.com/150'}" alt="" class="story-user-img">
                                <p class="story-username">${latest.userName}</p>
                            `;
                            card.onclick = () => openStoryViewer(userStories);
                            container.appendChild(card);
                        }
                    });
                });
            });
        }

        function uploadStory(e) {
            const file = e.target.files[0];
            if(!file || !currentUser) return;
            
            const reader = new FileReader();
            reader.onload = function(evt) {
                const storyId = db.ref('stories').push().key;
                const storyData = {
                    id: storyId,
                    uid: currentUser.uid,
                    userName: currentUser.displayName || 'Usuario',
                    userPhoto: currentUser.photoURL || 'https://via.placeholder.com/150',
                    mediaUrl: evt.target.result,
                    timestamp: firebase.database.ServerValue.TIMESTAMP
                };
                db.ref(`stories/${storyId}`).set(storyData).then(() => {
                    alert('¡Historia subida con éxito!');
                });
            };
            reader.readAsDataURL(file);
        }

        // --- SISTEMA INTELIGENTE DE FEED (SMART AI FEED - REQUERIMIENTO 6) ---
        function loadPosts() {
            const feed = document.getElementById('posts-feed');
            if(!feed) return;
            
            const myUid = auth.currentUser ? auth.currentUser.uid : null;
            
            db.ref(`follows/${myUid}`).on('value', followsSnap => {
                const follows = followsSnap.val() || {};
                
                db.ref('posts').on('value', snapshot => {
                    const posts = [];
                    snapshot.forEach(child => {
                        posts.push(child.val());
                    });
                    
                    const now = Date.now();
                    
                    // Algoritmo de IA para Priorizar y Recomendar Posts
                    posts.forEach(post => {
                        const hoursSincePost = (now - (post.timestamp || now)) / (1000 * 60 * 60);
                        let aiScore = 0;
                        
                        // 1. Priorizar publicaciones propias recién creadas (decay progresivo de 4 horas)
                        if (myUid && post.uid === myUid) {
                            aiScore += Math.max(2000 - (hoursSincePost * 500), 200);
                        }
                        // 2. Priorizar publicaciones de personas que sigo
                        else if (myUid && follows[post.uid]) {
                            aiScore += 400;
                        }
                        
                        // 3. Métricas de Engagement (Likes, Comentarios, Estrellas)
                        const likesCount = post.likes ? Object.keys(post.likes).length : 0;
                        const commentsCount = post.commentsCount || 0;
                        
                        let ratingSum = 0;
                        if (post.ratings) {
                            ratingSum = Object.values(post.ratings).reduce((acc, r) => acc + Number(r), 0);
                        }
                        
                        aiScore += (likesCount * 20);
                        aiScore += (commentsCount * 30);
                        aiScore += (ratingSum * 15);
                        
                        // Bonus de Versus con Frenesí activo
                        if (post.type === 'versus' && post.frenzyEndTime && (now < post.frenzyEndTime)) {
                            aiScore += 300;
                        }
                        
                        // 4. Decaimiento Temporal (resta puntuación a los más antiguos)
                        aiScore -= (hoursSincePost * 12);
                        
                        post.aiScore = aiScore;
                    });
                    
                    // Ordenar de forma inteligente descendente por la puntuación de IA
                    posts.sort((a,b) => b.aiScore - a.aiScore);
                    
                    renderPosts(posts);
                });
            });
        }

        // --- SISTEMA DE ENCUENTAS Y VOTOS ---
        function votePoll(postId, optionId) {
            const myUid = auth.currentUser ? auth.currentUser.uid : null;
            if(!myUid) return;
            
            const postRef = db.ref(`posts/${postId}`);
            postRef.once('value', snap => {
                const post = snap.val();
                if(!post || !post.poll) return;
                
                // Remover cualquier voto anterior en este post de encuesta
                post.poll.options.forEach((opt, idx) => {
                    db.ref(`posts/${postId}/poll/options/${idx}/votes/${myUid}`).remove();
                });
                
                // Agregar el voto actual
                db.ref(`posts/${postId}/poll/options/${optionId}/votes/${myUid}`).set(true);
            });
        }

        // --- ACCIONES Y VOTOS DEL VERSUS (REQUERIMIENTO 5) ---
        function voteVersus(postId, option) {
            const myUid = auth.currentUser ? auth.currentUser.uid : null;
            if(!myUid) return;
            
            const postRef = db.ref(`posts/${postId}`);
            postRef.once('value', snap => {
                const post = snap.val();
                if(!post) return;
                
                db.ref(`posts/${postId}/votesA/${myUid}`).remove();
                db.ref(`posts/${postId}/votesB/${myUid}`).remove();
                
                if (option === 'A') {
                    db.ref(`posts/${postId}/votesA/${myUid}`).set(true);
                } else {
                    db.ref(`posts/${postId}/votesB/${myUid}`).set(true);
                }
                
                // Sumar puntos con Frenesí (5x)
                const isFrenzy = post.frenzyEndTime && (Date.now() < post.frenzyEndTime);
                const points = isFrenzy ? 5 : 1;
                
                db.ref(`posts/${postId}/versusScore`).transaction(current => (current || 0) + points);
                
                // Bonificar puntos a los perfiles de los participantes
                db.ref(`users/${post.uid}/points`).transaction(current => (current || 0) + points);
                db.ref(`users/${post.opponentUid}/points`).transaction(current => (current || 0) + points);
            });
        }

        function searchVersusOpponent() {
            const query = document.getElementById('versus-opponent-search').value.toLowerCase().trim();
            const results = document.getElementById('versus-opponent-results');
            if(!query) return;
            
            db.ref('users').once('value', snap => {
                results.innerHTML = '';
                results.style.display = 'block';
                let found = false;
                
                snap.forEach(child => {
                    const user = child.val();
                    const username = (user.username || user.displayName || '').toLowerCase();
                    const dName = user.displayName || 'Usuario';
                    
                    if (username.includes(query) && child.key !== auth.currentUser.uid) {
                        found = true;
                        const div = document.createElement('div');
                        div.style.cssText = "display: flex; align-items: center; gap: 8px; padding: 8px; cursor: pointer; border-bottom: 1px solid rgba(0,0,0,0.05);";
                        div.innerHTML = `
                            <img src="${user.photoURL || 'https://via.placeholder.com/150'}" style="width: 24px; height: 24px; border-radius: 50%; object-fit: cover;">
                            <span style="font-size: 12px; font-weight: bold; color: var(--text-main);">${dName}</span>
                        `;
                        div.onclick = () => {
                            selectedOpponentUid = child.key;
                            selectedOpponentName = dName;
                            document.getElementById('selected-opponent-badge').style.display = 'flex';
                            document.getElementById('selected-opponent-name').textContent = `Desafiando a: ${dName}`;
                            results.style.display = 'none';
                        };
                        results.appendChild(div);
                    }
                });
                if(!found) {
                    results.innerHTML = `<p style="font-size:11px; color:#777; padding:5px;">No se encontraron usuarios.</p>`;
                }
            });
        }

        function clearSelectedOpponent() {
            selectedOpponentUid = null;
            selectedOpponentName = '';
            document.getElementById('selected-opponent-badge').style.display = 'none';
            document.getElementById('versus-opponent-search').value = '';
        }

        function triggerVersusImg(option) {
            document.getElementById('versus-file-' + option).click();
        }

        function previewVersusImg(option) {
            const file = document.getElementById('versus-file-' + option).files[0];
            if(!file) return;
            
            const reader = new FileReader();
            reader.onload = function(evt) {
                if(option === 'A') {
                    versusImgA = evt.target.result;
                    const preview = document.getElementById('versus-img-a-preview');
                    preview.src = versusImgA;
                    preview.style.display = 'block';
                } else {
                    versusImgB = evt.target.result;
                    const preview = document.getElementById('versus-img-b-preview');
                    preview.src = versusImgB;
                    preview.style.display = 'block';
                }
            };
            reader.readAsDataURL(file);
        }

        // --- RESPUESTA E INTERACCIÓN DE VERSUS EN NOTIFICACIONES (REQUERIMIENTO 5) ---
        function acceptVersus(requestId, notifId) {
            const myUid = auth.currentUser.uid;
            db.ref(`versusRequests/${requestId}`).once('value', snap => {
                const req = snap.val();
                if(!req) {
                    alert('Este desafío ya no está disponible.');
                    db.ref(`notifications/${myUid}/${notifId}`).remove();
                    return;
                }
                
                const postId = db.ref('posts').push().key;
                const versusPost = {
                    id: postId,
                    uid: req.senderUid,
                    userName: req.senderName,
                    userPhoto: req.senderPhoto,
                    opponentUid: req.receiverUid,
                    opponentName: req.receiverName,
                    caption: `⚔️ ¡DESAFÍO VERSUS ACTIVADO! ⚔️\n¿Quién es tu preferido en este enfrentamiento? ¡Vota ya!`,
                    type: 'versus',
                    optionATitle: req.optionATitle,
                    optionAImage: req.optionAImage,
                    optionBTitle: req.optionBTitle,
                    optionBImage: req.optionBImage,
                    votesA: {},
                    votesB: {},
                    versusScore: 0,
                    commentsCount: 0,
                    frenzyEndTime: Date.now() + 10 * 60 * 1000, // 10 minutos de Frenesí
                    timestamp: firebase.database.ServerValue.TIMESTAMP
                };
                
                db.ref(`posts/${postId}`).set(versusPost).then(() => {
                    db.ref(`versusRequests/${requestId}`).remove();
                    db.ref(`notifications/${myUid}/${notifId}`).remove();
                    
                    // Notificar al retador original
                    db.ref(`notifications/${req.senderUid}`).push({
                        type: 'versus_accepted',
                        senderUid: myUid,
                        senderName: auth.currentUser.displayName || 'Usuario',
                        senderPhoto: auth.currentUser.photoURL || 'https://via.placeholder.com/150',
                        text: `ha aceptado tu Versus: "${req.optionATitle} Vs ${req.optionBTitle}". ¡Ya está en el Feed!`,
                        timestamp: firebase.database.ServerValue.TIMESTAMP
                    });
                    
                    alert('¡Desafío aceptado y publicado en el Feed!');
                });
            });
        }

        function rejectVersus(requestId, notifId) {
            const myUid = auth.currentUser.uid;
            db.ref(`versusRequests/${requestId}`).once('value', snap => {
                const req = snap.val();
                if (req) {
                    db.ref(`notifications/${req.senderUid}`).push({
                        type: 'versus_rejected',
                        senderUid: myUid,
                        senderName: auth.currentUser.displayName || 'Usuario',
                        senderPhoto: auth.currentUser.photoURL || 'https://via.placeholder.com/150',
                        text: `ha rechazado tu solicitud de Versus.`,
                        timestamp: firebase.database.ServerValue.TIMESTAMP
                    });
                }
                db.ref(`versusRequests/${requestId}`).remove();
                db.ref(`notifications/${myUid}/${notifId}`).remove();
                alert('Desafío rechazado.');
            });
        }

        // --- MANEJO DE PUBLICACIÓN DE POSTS MULTI-TIPO ---
        function switchPostType(type) {
            currentPostType = type;
            
            document.querySelectorAll('.btn-tab').forEach(btn => {
                btn.classList.remove('active');
                btn.style.background = 'transparent';
                btn.style.color = 'var(--text-main)';
            });
            
            const activeBtn = document.getElementById('tab-' + type);
            if(activeBtn) {
                activeBtn.classList.add('active');
                activeBtn.style.background = 'var(--primary)';
                activeBtn.style.color = 'white';
            }
            
            document.getElementById('post-select-view').style.display = type === 'standard' ? 'flex' : 'none';
            document.getElementById('poll-creator-area').style.display = type === 'poll' ? 'block' : 'none';
            document.getElementById('versus-creator-area').style.display = type === 'versus' ? 'block' : 'none';
        }

        function openPostModal() {
            document.getElementById('post-modal').style.display = 'flex';
            switchPostType('standard');
        }

        function closePostModal() {
            document.getElementById('post-modal').style.display = 'none';
            resetPostForm();
        }

        function resetPostForm() {
            document.getElementById('post-caption').value = '';
            uploadedMedia = null;
            mediaType = null;
            const preview = document.getElementById('upload-preview');
            if(preview) preview.style.display = 'none';
            
            // Limpiar Encuesta
            document.getElementById('poll-question').value = '';
            document.getElementById('poll-opt-1').value = '';
            document.getElementById('poll-opt-2').value = '';
            document.getElementById('poll-opt-3').value = '';
            document.getElementById('poll-opt-4').value = '';
            
            // Limpiar Versus
            clearSelectedOpponent();
            document.getElementById('versus-title-a').value = '';
            document.getElementById('versus-title-b').value = '';
            versusImgA = null;
            versusImgB = null;
            document.getElementById('versus-img-a-preview').style.display = 'none';
            document.getElementById('versus-img-b-preview').style.display = 'none';
        }

        function triggerUpload() {
            document.getElementById('post-file-input').click();
        }

        function handleFileSelect(e) {
            const file = e.target.files[0];
            if(!file) return;
            
            const reader = new FileReader();
            reader.onload = function(evt) {
                uploadedMedia = evt.target.result;
                mediaType = file.type.startsWith('video/') ? 'video' : 'image';
                
                const preview = document.getElementById('upload-preview');
                preview.src = uploadedMedia;
                preview.style.display = 'block';
            };
            reader.readAsDataURL(file);
        }

        function uploadPost() {
            const myUid = auth.currentUser ? auth.currentUser.uid : null;
            if(!myUid) return;
            
            if (currentPostType === 'standard') {
                const caption = document.getElementById('post-caption').value.trim();
                if(!caption && !uploadedMedia) {
                    alert('Escribe un texto o sube contenido multimedia.');
                    return;
                }
                
                const postId = db.ref('posts').push().key;
                const postData = {
                    id: postId,
                    uid: myUid,
                    userName: currentUser.displayName || 'Usuario',
                    userPhoto: currentUser.photoURL || 'https://via.placeholder.com/150',
                    caption: caption,
                    mediaUrl: uploadedMedia || '',
                    mediaType: mediaType || '',
                    timestamp: firebase.database.ServerValue.TIMESTAMP,
                    likes: {},
                    commentsCount: 0
                };
                
                db.ref(`posts/${postId}`).set(postData).then(() => {
                    closePostModal();
                });
            } else if (currentPostType === 'poll') {
                const question = document.getElementById('poll-question').value.trim();
                const opt1 = document.getElementById('poll-opt-1').value.trim();
                const opt2 = document.getElementById('poll-opt-2').value.trim();
                const opt3 = document.getElementById('poll-opt-3').value.trim();
                const opt4 = document.getElementById('poll-opt-4').value.trim();
                
                if (!question || !opt1 || !opt2) {
                    alert('Ingresa la pregunta y al menos las 2 primeras opciones.');
                    return;
                }
                
                const options = [
                    { id: 0, text: opt1, votes: {} },
                    { id: 1, text: opt2, votes: {} }
                ];
                if (opt3) options.push({ id: 2, text: opt3, votes: {} });
                if (opt4) options.push({ id: 3, text: opt4, votes: {} });
                
                const postId = db.ref('posts').push().key;
                const postData = {
                    id: postId,
                    uid: myUid,
                    userName: currentUser.displayName || 'Usuario',
                    userPhoto: currentUser.photoURL || 'https://via.placeholder.com/150',
                    caption: `📊 ENCUESTA: ${question}`,
                    type: 'poll',
                    poll: {
                        question: question,
                        options: options
                    },
                    timestamp: firebase.database.ServerValue.TIMESTAMP,
                    likes: {},
                    commentsCount: 0
                };
                
                db.ref(`posts/${postId}`).set(postData).then(() => {
                    closePostModal();
                });
            } else if (currentPostType === 'versus') {
                if (!selectedOpponentUid) {
                    alert('Debes buscar y seleccionar un oponente para el Versus.');
                    return;
                }
                const titleA = document.getElementById('versus-title-a').value.trim();
                const titleB = document.getElementById('versus-title-b').value.trim();
                
                if(!titleA || !titleB || !versusImgA || !versusImgB) {
                    alert('Completa los campos y sube ambas fotos para el versus.');
                    return;
                }
                
                const requestId = db.ref('versusRequests').push().key;
                const requestData = {
                    id: requestId,
                    senderUid: myUid,
                    senderName: currentUser.displayName || 'Usuario',
                    senderPhoto: currentUser.photoURL || 'https://via.placeholder.com/150',
                    receiverUid: selectedOpponentUid,
                    receiverName: selectedOpponentName,
                    optionATitle: titleA,
                    optionAImage: versusImgA,
                    optionBTitle: titleB,
                    optionBImage: versusImgB,
                    timestamp: firebase.database.ServerValue.TIMESTAMP
                };
                
                db.ref(`versusRequests/${requestId}`).set(requestData).then(() => {
                    db.ref(`notifications/${selectedOpponentUid}/${requestId}`).set({
                        id: requestId,
                        type: 'versus_request',
                        senderUid: myUid,
                        senderName: currentUser.displayName || 'Usuario',
                        senderPhoto: currentUser.photoURL || 'https://via.placeholder.com/150',
                        text: `te ha retado a un Versus: "${titleA} Vs ${titleB}"`,
                        requestId: requestId,
                        timestamp: firebase.database.ServerValue.TIMESTAMP
                    });
                    
                    alert('¡Solicitud de Versus enviada! Tu oponente debe aceptarla para publicarse.');
                    closePostModal();
                });
            }
        }

        // --- SISTEMA DE NOTIFICACIONES INTERACTIVAS ---
        function loadNotifications() {
            const list = document.getElementById('notifications-list');
            if(!list) return;
            
            const myUid = auth.currentUser ? auth.currentUser.uid : null;
            if(!myUid) return;
            
            db.ref(`notifications/${myUid}`).on('value', snapshot => {
                list.innerHTML = '';
                
                if(!snapshot.exists()) {
                    list.innerHTML = '<p style="padding:20px; text-align:center;">No tienes notificaciones.</p>';
                    return;
                }
                
                snapshot.forEach(child => {
                    const notif = child.val();
                    const item = document.createElement('div');
                    item.className = 'notif-item';
                    item.style.flexDirection = 'column';
                    
                    const meta = document.createElement('div');
                    meta.style.cssText = "display: flex; align-items: center; gap: 10px; width: 100%;";
                    meta.innerHTML = `
                        <img src="${notif.senderPhoto || 'https://via.placeholder.com/150'}" style="width: 40px; height: 40px; border-radius: 50%; object-fit: cover;">
                        <div style="flex:1;">
                            <p style="font-size:13px;"><strong style="font-weight:700;">${notif.senderName}</strong> ${notif.text}</p>
                            <p style="font-size:10px; color:#888;">${formatTime(notif.timestamp)}</p>
                        </div>
                    `;
                    item.appendChild(meta);
                    
                    if (notif.type === 'versus_request') {
                        const actionsDiv = document.createElement('div');
                        actionsDiv.style.cssText = "display: flex; gap: 10px; margin-top: 8px; margin-left: 50px; width: calc(100% - 50px);";
                        
                        const accept = document.createElement('button');
                        accept.className = "btn";
                        accept.style.cssText = "padding: 6px 12px; font-size: 11px; background: #2ecc71; color: white; border-radius: 8px;";
                        accept.textContent = "Aceptar";
                        accept.onclick = () => acceptVersus(notif.requestId, child.key);
                        
                        const reject = document.createElement('button');
                        reject.className = "btn";
                        reject.style.cssText = "padding: 6px 12px; font-size: 11px; background: #e74c3c; color: white; border-radius: 8px;";
                        reject.textContent = "Rechazar";
                        reject.onclick = () => rejectVersus(notif.requestId, child.key);
                        
                        actionsDiv.appendChild(accept);
                        actionsDiv.appendChild(reject);
                        item.appendChild(actionsDiv);
                    }
                    
                    list.appendChild(item);
                });
            });
        }

        // --- CORE LOGIC (Likes, Follows, Calificaciones, Comentarios) ---
        function likePost(postId) {
            const myUid = auth.currentUser ? auth.currentUser.uid : null;
            if(!myUid) return;
            
            const likeRef = db.ref(`posts/${postId}/likes/${myUid}`);
            likeRef.once('value', snap => {
                if(snap.exists()) {
                    likeRef.remove();
                } else {
                    likeRef.set(true);
                    // Notificar al creador del post
                    db.ref(`posts/${postId}`).once('value', postSnap => {
                        const post = postSnap.val();
                        if (post && post.uid !== myUid) {
                            sendNotification(post.uid, 'like', 'le ha dado Like a tu publicación');
                        }
                    });
                }
            });
        }

        function ratePost(postId, stars) {
            const myUid = auth.currentUser ? auth.currentUser.uid : null;
            if(!myUid) return;
            
            db.ref(`posts/${postId}/ratings/${myUid}`).set(stars);
        }

        function toggleFollow(targetUid) {
            const myUid = auth.currentUser ? auth.currentUser.uid : null;
            if(!myUid || myUid === targetUid) return;
            
            const followRef = db.ref(`follows/${myUid}/${targetUid}`);
            followRef.once('value', snap => {
                if(snap.exists()) {
                    followRef.remove();
                    db.ref(`followers/${targetUid}/${myUid}`).remove();
                } else {
                    followRef.set(true);
                    db.ref(`followers/${targetUid}/${myUid}`).set(true);
                    sendNotification(targetUid, 'follow', 'ha empezado a seguirte');
                }
            });
        }

        function openComments(postId) {
            const modal = document.getElementById('comments-modal');
            modal.style.display = 'flex';
            
            // Configurar botón enviar
            const sendBtn = document.getElementById('comment-send-btn');
            sendBtn.onclick = () => {
                const input = document.getElementById('comment-input');
                const text = input.value.trim();
                if(!text) return;
                
                const commId = db.ref(`comments/${postId}`).push().key;
                const commentData = {
                    id: commId,
                    uid: currentUser.uid,
                    userName: currentUser.displayName || 'Usuario',
                    userPhoto: currentUser.photoURL || 'https://via.placeholder.com/150',
                    text: text,
                    timestamp: firebase.database.ServerValue.TIMESTAMP
                };
                
                db.ref(`comments/${postId}/${commId}`).set(commentData).then(() => {
                    input.value = '';
                });
            };
            
            // Escuchar comentarios en tiempo real
            db.ref(`comments/${postId}`).on('value', snap => {
                const list = document.getElementById('comments-list');
                list.innerHTML = '';
                
                snap.forEach(child => {
                    const comment = child.val();
                    const item = document.createElement('div');
                    item.style.cssText = "display: flex; gap: 10px; margin-bottom: 12px; align-items: flex-start;";
                    item.innerHTML = `
                        <img src="${comment.userPhoto || 'https://via.placeholder.com/150'}" style="width: 32px; height: 32px; border-radius: 50%; object-fit: cover;">
                        <div style="background: var(--bg-color); padding: 10px; border-radius: 12px; flex: 1;">
                            <p style="font-size: 12px; font-weight: bold; color: var(--text-main);">${comment.userName}</p>
                            <p style="font-size: 13px; color: var(--text-main); margin-top: 2px;">${comment.text}</p>
                        </div>
                    `;
                    list.appendChild(item);
                });
                list.scrollTop = list.scrollHeight;
            });
        }

        function closeComments() {
            document.getElementById('comments-modal').style.display = 'none';
        }

        function sendNotification(targetUid, type, text) {
            const myUid = auth.currentUser.uid;
            db.ref(`notifications/${targetUid}`).push({
                type: type,
                senderUid: myUid,
                senderName: currentUser.displayName || 'Usuario',
                senderPhoto: currentUser.photoURL || 'https://via.placeholder.com/150',
                text: text,
                timestamp: firebase.database.ServerValue.TIMESTAMP
            });
        }

        function searchUsers() {
            const query = document.getElementById('search-input').value.toLowerCase().trim();
            const results = document.getElementById('search-results');
            if(!query) return;
            
            db.ref('users').once('value', snap => {
                results.innerHTML = '';
                snap.forEach(child => {
                    const user = child.val();
                    const username = (user.username || user.displayName || '').toLowerCase();
                    const dName = user.displayName || 'Usuario';
                    
                    if(username.includes(query) && child.key !== auth.currentUser.uid) {
                        const row = document.createElement('div');
                        row.style.cssText = "display: flex; align-items: center; justify-content: space-between; padding: 12px; background: var(--surface); border-radius: 14px; margin-bottom: 10px; box-shadow: var(--shadow);";
                        row.innerHTML = `
                            <div style="display: flex; align-items: center; gap: 10px;">
                                <img src="${user.photoURL || 'https://via.placeholder.com/150'}" style="width: 40px; height: 40px; border-radius: 50%; object-fit: cover;">
                                <span style="font-weight: bold;">${dName}</span>
                            </div>
                            <button class="btn btn-primary" onclick="toggleFollow('${child.key}')">Seguir</button>
                        `;
                        results.appendChild(row);
                    }
                });
            });
        }

        // --- CONFIGURACIÓN DE TEMA Y TRADUCCIONES ---
        function toggleTheme() {
            currentTheme = currentTheme === 'dark' ? 'light' : 'dark';
            document.documentElement.setAttribute('data-theme', currentTheme);
            document.getElementById('theme-btn-set').textContent = currentTheme === 'dark' ? 'Apagar' : 'Activar';
        }

        function switchLanguage() {
            currentLanguage = currentLanguage === 'es' ? 'en' : 'es';
            document.getElementById('lang-btn-set').textContent = currentLanguage === 'es' ? 'Español' : 'English';
            applyTranslations();
        }

        function applyTranslations() {
            const dict = translations[currentLanguage];
            document.getElementById('search-input').placeholder = dict.searchPlaceholder;
            document.getElementById('t-create-post').textContent = dict.createPost;
            document.getElementById('t-upload-tap').textContent = dict.tapToUpload;
            document.getElementById('post-caption').placeholder = dict.captionPlaceholder;
            document.getElementById('t-btn-pub').innerHTML = `<i class="fas fa-magic"></i> ${dict.btnPub}`;
            document.getElementById('t-notif-title').textContent = dict.notifTitle;
            document.getElementById('t-settings').textContent = dict.settings;
            document.getElementById('t-dark-theme').textContent = dict.darkTheme;
            document.getElementById('t-lang').textContent = dict.lang;
            document.getElementById('t-logout').textContent = dict.logoutBtn;
            document.getElementById('t-edit-prof').textContent = dict.editProfTitle;
            document.getElementById('t-edit-prof-title').textContent = dict.editProfTitle;
            document.getElementById('t-name').textContent = dict.nameLabel;
            document.getElementById('t-bio').textContent = dict.bioLabel;
            document.getElementById('t-save').textContent = dict.saveBtn;
            document.getElementById('t-comments').textContent = dict.commentsTitle;
            document.getElementById('comment-input').placeholder = dict.commentPlaceholder;
        }

        function logout() {
            auth.signOut().then(() => {
                location.reload();
            });
        }

        function saveProfile() {
            const name = document.getElementById('edit-displayname').value.trim();
            const bio = document.getElementById('edit-bio').value.trim();
            if(!currentUser) return;
            
            db.ref(`users/${currentUser.uid}`).update({
                displayName: name || currentUser.displayName,
                bio: bio
            }).then(() => {
                alert('Perfil actualizado.');
                switchView('settings-view');
            });
        }

        // Formateador de tiempo universal
        function formatTime(timestamp) {
            if(!timestamp) return '';
            const diff = Date.now() - timestamp;
            const secs = Math.floor(diff / 1000);
            const mins = Math.floor(secs / 60);
            const hours = Math.floor(mins / 60);
            const days = Math.floor(hours / 24);
            
            if (days > 0) return `hace ${days} d`;
            if (hours > 0) return `hace ${hours} h`;
            if (mins > 0) return `hace ${mins} min`;
            return 'hace unos momentos';
        }
    </script>
</body>
